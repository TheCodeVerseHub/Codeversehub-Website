name: "Question"
description: "Ask a question or request support"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for questions about the website/repo.

        **Security issues:** please do **not** file a public issue. See SECURITY.md.

  - type: checkboxes
    id: checks
    attributes:
      label: "Pre-flight checks"
      options:
        - label: "I searched existing issues to avoid duplicates"
          required: true
        - label: "I checked the README/Docs (if applicable)"
          required: false

  - type: textarea
    id: question
    attributes:
      label: "Your question"
      description: "What do you want to know?"
      placeholder: "How do I ...? Why does ... happen?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Share any relevant context, links, screenshots, or code snippets."
      placeholder: "What were you trying to do? What did you try already?"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: "Environment (if relevant)"
      placeholder: |
        - OS:
        - Browser:
        - Node.js version:
        - Next.js version:
    validations:
      required: false
