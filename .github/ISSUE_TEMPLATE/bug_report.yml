name: "Bug report"
description: "Report a problem with the website"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Security issues:** Please do **not** file a public issue. See SECURITY.md in this repo.

  - type: checkboxes
    id: checks
    attributes:
      label: "Pre-flight checks"
      options:
        - label: "I searched existing issues to avoid duplicates"
          required: true
        - label: "This is not a security vulnerability report (those belong in SECURITY.md)"
          required: true

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "A clear and concise description of the bug"
      placeholder: "What went wrong?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "How can we reproduce the issue?"
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      placeholder: "What actually happened? Include screenshots if helpful."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Where are you seeing this?"
      placeholder: |
        - OS:
        - Browser:
        - Device:
        - Node.js version (if running locally):
        - Next.js version (if known):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Logs / console output"
      description: "Paste relevant logs (if any)."
      render: shell
    validations:
      required: false
